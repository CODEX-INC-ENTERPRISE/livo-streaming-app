<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Livo Admin – Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50:  '#fdf4ff',
              100: '#fae8ff',
              200: '#f5d0fe',
              300: '#f0abfc',
              400: '#e879f9',
              500: '#d946ef',
              600: '#c026d3',
              700: '#a21caf',
              800: '#86198f',
              900: '#701a75',
            },
            sidebar: '#1e1b4b',
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui'],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <style>
    body {
      background: linear-gradient(135deg, #1e1b4b 0%, #701a75 100%);
      min-height: 100vh;
    }
  </style>
</head>
<body class="h-full font-sans flex items-center justify-center p-4">

  <div class="bg-white rounded-2xl shadow-2xl p-10 w-full max-w-md">

    <!-- Logo & heading -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary-100 mb-4">
        <svg class="w-8 h-8 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 10l4.553-2.069A1 1 0 0121 8.882v6.236a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">Livo Admin</h1>
      <p class="text-gray-500 text-sm mt-1">Sign in to your admin account</p>
    </div>

    <!-- Login form -->
    <form id="login-form" novalidate>

      <div class="mb-5">
        <label for="login-email" class="block text-sm font-medium text-gray-700 mb-1">
          Email address
        </label>
        <input
          id="login-email"
          type="email"
          autocomplete="email"
          required
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition"
          placeholder="admin@example.com"
          aria-describedby="login-error"
        />
      </div>

      <div class="mb-6">
        <label for="login-password" class="block text-sm font-medium text-gray-700 mb-1">
          Password
        </label>
        <div class="relative">
          <input
            id="login-password"
            type="password"
            autocomplete="current-password"
            required
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition pr-10"
            placeholder="••••••••"
            aria-describedby="login-error"
          />
          <!-- Toggle password visibility -->
          <button
            type="button"
            id="toggle-password"
            class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600 focus:outline-none"
            aria-label="Toggle password visibility"
          >
            <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Error message -->
      <div
        id="login-error"
        role="alert"
        aria-live="polite"
        class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700"
      ></div>

      <!-- Submit button -->
      <button
        type="submit"
        id="login-btn"
        class="w-full py-2.5 px-4 bg-primary-600 hover:bg-primary-700 text-white font-semibold rounded-lg text-sm transition focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 disabled:opacity-60 disabled:cursor-not-allowed"
      >
        Sign in
      </button>

    </form>

  </div>

  <script type="module">
    import { login, isAuthenticated } from './js/auth.js';

    // If already authenticated, go straight to the dashboard
    if (isAuthenticated()) {
      window.location.replace('index.html');
    }

    const form        = document.getElementById('login-form');
    const emailInput  = document.getElementById('login-email');
    const passInput   = document.getElementById('login-password');
    const errorEl     = document.getElementById('login-error');
    const loginBtn    = document.getElementById('login-btn');
    const toggleBtn   = document.getElementById('toggle-password');
    const eyeIcon     = document.getElementById('eye-icon');

    // Password visibility toggle
    toggleBtn.addEventListener('click', () => {
      const isPassword = passInput.type === 'password';
      passInput.type = isPassword ? 'text' : 'password';
      eyeIcon.innerHTML = isPassword
        ? `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
             d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />`
        : `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
             d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
             d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />`;
    });

    function showError(message) {
      errorEl.textContent = message;
      errorEl.classList.remove('hidden');
    }

    function hideError() {
      errorEl.classList.add('hidden');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const email    = emailInput.value.trim();
      const password = passInput.value;

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      loginBtn.disabled    = true;
      loginBtn.textContent = 'Signing in…';

      try {
        await login(email, password);
        // Redirect to dashboard on success
        window.location.replace('index.html');
      } catch (err) {
        showError(err.message || 'Unable to connect. Please try again.');
      } finally {
        loginBtn.disabled    = false;
        loginBtn.textContent = 'Sign in';
      }
    });
  </script>

</body>
</html>
